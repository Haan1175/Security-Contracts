services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: contracts
      POSTGRES_USER: contracts_user
      POSTGRES_PASSWORD: contracts_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contracts_user -d contracts"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://contracts_user:contracts_pass@db:5432/contracts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
